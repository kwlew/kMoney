name: kMoney
description: $description
version: '${version}'

main: dev.kwlew.kMoney
api-version: '1.21'

author: KWLEW
website: https://kwlew.dev

soft-depend:
  - PlaceholderAPI
  - Vault

commands:
  money:
    description: View balances, transfer money, and manage checks.
    usage: /money [balance|pay|add|remove|set|withdraw|reload]
    permission: kmoney.command.money

permissions:
  kmoney.command.money:
    description: Allows access to the /money command and balance checks.
    default: true
  kmoney.command.money.reload:
    description: Allows reloading plugin configuration.
    default: op
  kmoney.command.money.add:
    description: Allows adding money to a player.
    default: op
  kmoney.command.money.remove:
    description: Allows removing money from a player.
    default: op
  kmoney.command.money.set:
    description: Allows setting a player's balance.
    default: op
  kmoney.command.money.withdraw:
    description: Allows creating money checks.
    default: true
  kmoney.command.money.pay:
    description: Allows using /money pay.
    default: true
  kmoney.admin:
    description: Full access to admin money commands.
    default: op
    children:
      kmoney.command.money: true
      kmoney.command.money.reload: true
      kmoney.command.money.add: true
      kmoney.command.money.remove: true
      kmoney.command.money.set: true
      kmoney.command.money.withdraw: true
      kmoney.command.money.pay: true
